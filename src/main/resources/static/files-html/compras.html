<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🛒 - Compras</title>

  <link rel="stylesheet" href="../files-css/style.css"/>
  <link rel="stylesheet" href="../files-css/compras.css"/>
  <link rel="stylesheet" href="../files-css/nav.css">

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
  <div id="app-header"></div>

  <main class="page">
    <div class="page-head">
      <h1>Compras</h1>

      <div class="actions" style="display:flex;">
        <a class="btn primary" href="../files-html/crear-compra.html">+ Nueva compra</a>

        <button type="button"
                id="btnExport"
                class="btn outline with-icon"
                style="margin-left:10px; border:0.6px solid black; padding:10px;">
          <span class="icon">⬇</span>
          <span>Exportar</span>
        </button>
      </div>
    </div>

    <hr><br>

    <section class="filters card">
      <div class="row">
        
     <label>ID Compra
          <input type="number" id="buscarId" class="in" placeholder="ID" min="1"/>
        </label>

        <label>Proveedor
          <div class="autocomplete-wrapper" id="ac-proveedor-wrapper">
            <input type="text" id="buscarProveedorSearch" class="in" placeholder="Buscar proveedor..." autocomplete="off">
            <input type="hidden" id="buscarProveedor"> 
            <div class="autocomplete-list"></div>
          </div>
        </label>

        <label>Estado
          <select id="buscarEstado" class="in">
            <option value="">Todos</option>
            <option value="ACTIVE">Activa</option>
            <option value="CANCELLED">Anulada</option>
          </select>
        </label>

        <label>Desde
          <input type="date" id="buscarDesde"/>
        </label>

        <label>Hasta
          <input type="date" id="buscarHasta"/>
        </label>

        <button id="btnLimpiar" class="btn outline" style="align-self: flex-end;">Limpiar</button>
      </div>
    </section>

    <section class="card">
      <div class="tabla" id="lista-compras">
        <div class="fila encabezado">
          <div>ID</div>
          <div>Fecha</div>
          <div>Proveedor</div>
          <div>Total</div>
          <div>Estado</div>
          <div>Acciones</div>
        </div>
      </div>

      <div class="pager">
        <div class="info" id="pg-info"></div>
        <button class="btn" id="pg-prev">« Anterior</button>
        <button class="btn" id="pg-next">Siguiente »</button>
      </div>
    </section>
  </main>

  <script src="../files-js/core/api.js"></script>
  <script src="../files-js/header.js"></script>
  <script src="../files-js/role-guard.js"></script>
  <script>
    guard.onlyAllow(['owner','admin'], '../files-html/index-emp.html');
  </script>
  <script src="../files-js/menu-guard.js"></script>
  <script src="../files-js/compras.js"></script>
</body>
</html>
