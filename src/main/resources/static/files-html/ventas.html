<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>📈 - Ventas</title>
  
  <link rel="stylesheet" href="../files-css/style.css"/>
  <link rel="stylesheet" href="../files-css/ventas.css"/>
  <link rel="stylesheet" href="../files-css/nav.css">
  
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <div id="app-header"></div>

  <main class="page">
    <div class="page-head">
      <h1>Ventas</h1>
      <div class="actions">
        <a class="btn primary" id="btnNuevaVenta" href="../files-html/crear-venta.html">+ Nueva venta</a>
        <button id="btn-export-sales" class="btn outline" style="border: 0.6px solid black; margin-left: 10px;">⬇ Exportar</button>
      </div>
    </div>

    <hr><br>

    <section class="filters card">
      <div class="row">

        <label>Desde
          <input type="date" id="fDesde"/>
        </label>

        <label>Hasta
          <input type="date" id="fHasta"/>
        </label>

        <label>Estado
          <select id="fEstadoEntrega">
            <option value="">Todos</option>
            <option value="PENDING_DELIVERY">Pendiente a entregar</option>
            <option value="DELIVERED">Entregada</option>
            <option value="CANCELLED">Anulada</option>
          </select>
        </label>

        <label id="wrapEstadoPago">Pago
          <select id="fEstadoPago">
            <option value="">Todos</option>
            <option value="DUE">Pendiente a cobrar</option>
            <option value="PARTIAL">Parcial</option>
            <option value="PAID">Pagado</option>
          </select>
        </label>

        <label>Cliente
          <div class="autocomplete-wrapper" id="ac-cliente-wrapper">
            <input type="text" id="fClienteSearch" class="in" placeholder="Buscar cliente..." autocomplete="off">
            <input type="hidden" id="fCliente"> 
            <div class="autocomplete-list"></div>
          </div>
        </label>

        <button id="btnLimpiar" class="btn outline" style="align-self: flex-end;">Limpiar</button>
        
      </div>
    </section>

    <section class="card">
      <div class="tabla" id="lista-ventas">
        <div class="fila encabezado">
          <div>Fecha</div>
          <div>Cliente</div>
          <div>Estado</div>
          <div class="text-right">Total</div>
          <div margin-left: 120px;>Acciones</div>
        </div>
      </div>
    </section>

    <div class="pager">
      <div class="info" id="pg-info"></div>
      <button class="btn" id="pg-prev">« Anterior</button>
      <button class="btn" id="pg-next">Siguiente »</button>
    </div>
  </main>

  <script src="../files-js/core/api.js"></script>
  <script>window.api.setBaseUrl('http://localhost:8088');</script>
  <script src="../files-js/header.js"></script>
  <script src="../files-js/menu-guard.js"></script>
  <script src="../files-js/ventas.js"></script>
</body>
</html>
