<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>📈 Registrar pago</title>

  <link rel="stylesheet" href="../files-css/style.css"/>
  <link rel="stylesheet" href="../files-css/ventas.css"/>
  <link rel="stylesheet" href="../files-css/nav.css"/>
  <link rel="stylesheet" href="../files-css/registrar-pago.css"/>
  
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <div id="app-header"></div>

  <main class="page">
    <div class="page-head">
      <h1>Registrar pago</h1>
      <div class="actions">
          <a id="btnVolver" class="btn outline">Volver</a>
      </div>
    </div>

    <div class="grid-2">
      <section class="card summary-card">
        <div class="card-head">
            <h3>Resumen de la venta</h3>
            <p class="hint" id="saleInfo">Cargando datos...</p>
        </div>
        
        <div class="summary">
          <div class="pill-kpi">
            <small>Total</small>
            <strong id="kpiTotal">—</strong>
          </div>
          <div class="pill-kpi">
            <small>Pagado</small>
            <strong id="kpiPaid">—</strong>
          </div>
          <div class="pill-kpi highlight">
            <small>Saldo pendiente</small>
            <strong id="kpiBalance">—</strong>
          </div>
        </div>
      </section>

      <section class="card form-card">
        <div class="card-head"><h3>Nuevo pago</h3></div>

        <form id="form-pago" class="form-grid" autocomplete="off">
          <label>
            <span>Fecha</span>
            <input id="fecha" type="date" required/>
          </label>

          <label>
            <span>Método de pago</span>
            <select id="metodo" required>
              <option value="">Seleccionar…</option>
              <option value="CASH">Efectivo</option>
              <option value="TRANSFER">Transferencia</option>
              <option value="CARD">Tarjeta</option>
              <option value="OTHER">Otro</option>
            </select>
          </label>

          <div class="full">
            <label>
              <span>Importe a pagar</span>
              <div class="input-addon">
                <input id="importe" type="number" step="0.01" min="0.01" placeholder="0.00" required/>
              </div>
            </label>
          </div>

          <div class="full actions form-actions">
            <button class="btn primary" type="submit" id="btnGuardar">Registrar pago</button>
            <button class="btn outline" type="button" id="btnCancelar">Cancelar</button>
          </div>
        </form>
      </section>
    </div>
  </main>

  <script src="../files-js/core/api.js"></script>
  <script>window.api.setBaseUrl('http://localhost:8088');</script>
  <script src="../files-js/header.js"></script>
  <script src="../files-js/menu-guard.js"></script>
  <script src="../files-js/registrar-pago.js"></script>
</body>
</html>
